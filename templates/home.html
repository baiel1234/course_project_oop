<!DOCTYPE html>
<html>
<head>
    <title>Test Platform</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:40px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .search-box{
            margin-bottom:20px;
        }

        input{
            padding:10px;
            width:300px;
        }

        button{
            padding:10px 15px;
            cursor:pointer;
        }

        .tests{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
        }

        .test-card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<div class="header">

    <h1>Online Tests</h1>

    <a href="/login/">
        <button>Login</button>
    <a href="/register/">
        <button>Register</button>
    </a>

</div>


<div class="search-box">

    <form method="GET">

        <input type="text" name="q" placeholder="Search tests...">

        <button type="submit">Search</button>

    </form>

</div>


<div class="tests">

    {% for test in tests %}

        <div class="test-card">

            <h3>{{ test.title }}</h3>

            <p>{{ test.description }}</p>

            <p>Questions: {{ test.question_count }}</p>

            <a href="/test/{{test.id}}/">
                <button>Open Test</button>
            </a>

        </div>

    {% endfor %}

</div>

</body>
</html>

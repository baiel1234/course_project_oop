{% extends "base.html" %}

{% block content %}

<div class="container">

<h2> Add Answers: {{ test.title }}</h2>

<div class="card">

<form method="POST">
{% csrf_token %}

<input type="hidden" name="test_id" value="{{ test.id }}">

{% for i in range %}

<div class="options">
    <b>Question {{ forloop.counter }}</b><br>

    <label><input type="radio" name="q{{ forloop.counter }}" value="A"> A</label>
    <label><input type="radio" name="q{{ forloop.counter }}" value="B"> B</label>
    <label><input type="radio" name="q{{ forloop.counter }}" value="C"> C</label>
    <label><input type="radio" name="q{{ forloop.counter }}" value="D"> D</label>
</div>

{% endfor %}

<button type="submit"> Save Answers</button>

</form>

</div>

</div>

{% endblock %}

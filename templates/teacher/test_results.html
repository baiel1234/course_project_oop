{% extends "base.html" %}

{% block content %}

<h2>Test Results</h2>

<table border="1">

<tr>

<th>Student</th>
<th>Score</th>
<th>Total</th>
<th>Date</th>

</tr>

{% for r in results %}

<tr>

<td>{{r.student.username}}</td>

<td>{{r.score}}</td>

<td>{{r.total}}</td>

<td>{{r.created_at}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}

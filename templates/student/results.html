{% extends "base.html" %}

{% block content %}

<h2>My Results</h2>

<table border="1" cellpadding="10">

<tr>
<th>Test</th>
<th>Score</th>
<th>Total</th>
</tr>

{% for r in results %}

<tr>

<td>{{r.test.title}}</td>

<td>{{r.score}}</td>

<td>{{r.total}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}

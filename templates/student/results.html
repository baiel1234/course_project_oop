{% extends "base.html" %}

{% block content %}

<div class="container">

<h2> My Results</h2>

<table>

<tr>
<th>Student</th>
<th>Score</th>
<th>Total</th>
<th>Date</th>
</tr>

{% for r in results %}
<tr>
<td>{{ r.student.username }}</td>
<td>{{ r.score }}</td>
<td>{{ r.total }}</td>
<td>{{ r.created_at|date:"Y-m-d H:i" }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}

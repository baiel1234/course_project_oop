{% extends "base.html" %}

{% block content %}

<div class="container">

<h2> Available Tests</h2>

{% for test in tests %}

<div class="card">

<h3>{{ test.title }}</h3>

<p>{{ test.description }}</p>

<p> Questions: {{ test.question_count }}</p>

<a href="/test/{{ test.id }}/">
    <button>Start Test</button>
</a>

</div>

{% endfor %}

</div>

{% endblock %}

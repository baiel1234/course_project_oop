{% extends "base.html" %}

{% block content %}

<h2>Available Tests</h2>

{% for test in tests %}

<div style="background:white;padding:20px;margin-bottom:15px;">

<h3>{{test.title}}</h3>

<p>{{test.description}}</p>

<p>Questions: {{test.question_count}}</p>

<a href="/test/{{test.id}}/">

<button>Start Test</button>

</a>

</div>

{% endfor %}

{% endblock %}

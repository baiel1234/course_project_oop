<!DOCTYPE html>
<html>
<head>
<title>Test Platform</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    margin:40px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

a{
    text-decoration:none;
    margin-right:10px;
}

.search-box{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:300px;
}

.tests{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.test-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="header">

<!-- 🔗 Переход на главную -->
<h2>
    <a href="{% url 'home' %}">Online Tests</a>
</h2>

<div>

{% if user.is_authenticated %}

    <!-- 👤 пользователь -->
    <span>👤 {{ user.username }} ({{ role }})</span>

    <!-- 🔓 logout -->
    <a href="{% url 'logout' %}">
        <button>Logout</button>
    </a>

    <!-- 👨‍🎓 студент -->
    {% if role == "student" %}
        <a href="{% url 'my_results' %}">
            <button>My Results</button>
        </a>
    {% endif %}

    <!-- 👨‍🏫 учитель -->
    {% if role == "teacher" %}
        <a href="{% url 'create_test' %}">
            <button>Create Test</button>
        </a>

        <a href="{% url 'teacher_dashboard' %}">
            <button>Dashboard</button>
        </a>
    {% endif %}

{% else %}

    <!-- 🔐 не авторизован -->
    <a href="{% url 'login' %}">
        <button>Login</button>
    </a>

    <a href="{% url 'register' %}">
        <button>Register</button>
    </a>

{% endif %}

</div>

</div>

<!-- 🔽 Контент страниц -->
{% block content %}
{% endblock %}

</body>
</html>
